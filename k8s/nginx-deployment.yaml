apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmaos-nginx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: farmaos-nginx
  template:
    metadata:
      labels:
        app: farmaos-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        - name: web-files
          mountPath: /usr/share/nginx/html
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: web-files
        hostPath:
          path: /var/www/farmaos-web
          type: Directory
