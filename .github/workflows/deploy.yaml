name: Deploy FarmaOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/pharmacy-api
            git pull origin main
            docker compose down
            docker compose up -d --build